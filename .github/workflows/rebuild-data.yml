name: Rebuild Data

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "runs-on"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
  workflow_call:
    inputs:
      runs:
        description: "runs-on"
        type: string
        required: true

jobs:
  rebuild-data:
    runs-on: ${{ inputs.runs }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          sparse-checkout: |
            dsm
            data.yml
            webdata.txt

      - name: Initialization environment
        run: |
          git config --global user.email "info@auxxxilium.tech"
          git config --global user.name "AuxXxilium"
          sudo timedatectl set-timezone "Europe/Berlin"
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download configs
        run: |
          sudo rm -rf -- ./configs
          mkdir -p ./configs
          curl --insecure -fsSL "https://raw.githubusercontent.com/AuxXxilium/arc-configs/main/platforms.yml" \
            -o ./configs/platforms.yml

      - name: Rebuild data.yml and webdata.txt
        run: |
          set -e

          # Build model->platform map from RSS (same logic as functions.py)
          # RSS mUnique strips DS/RS/FS/SA/HD/DVA/PAS prefixes for many models,
          # so the map key may be "620slim" rather than "ds620slim".
          declare -A MODEL_PLATFORM
          SUPPORTED_PLATFORMS="$(yq eval '.platforms | keys | .[]' ./configs/platforms.yml)"
          RSS="$(curl -fsSL "https://update7.synology.com/autoupdate/genRSS.php?include_beta=1")"
          while IFS= read -r munique; do
            IFS='_' read -ra parts <<< "${munique}"
            [ "${#parts[@]}" -lt 3 ] && continue
            [ "${parts[0]}" != "synology" ] && continue
            platform="${parts[1],,}"
            echo "${SUPPORTED_PLATFORMS}" | grep -qxF "${platform}" || continue
            model="$(IFS='_'; echo "${parts[*]:2}" | tr '[:upper:]' '[:lower:]')"
            MODEL_PLATFORM["${model}"]="${platform}"
          done < <(echo "${RSS}" | grep -oP '(?<=<mUnique>)[^<]+')

          # Lookup helper: match dsm/ folder name against MODEL_PLATFORM,
          # falling back to prefix-stripped key (DS/RS/FS/SA/HD/DVA/PAS).
          lookup_platform() {
            local key="${1,,}"
            if [ -n "${MODEL_PLATFORM[${key}]:-}" ]; then
              echo "${MODEL_PLATFORM[${key}]}"
              return
            fi
            local bare
            bare="$(echo "${key}" | sed -E 's/^(ds|rs|fs|sa|hd|dva|pas)//')"
            if [ -n "${MODEL_PLATFORM[${bare}]:-}" ]; then
              echo "${MODEL_PLATFORM[${bare}]}"
              return
            fi
            echo ""
          }

          # Rebuild from dsm/<MODEL>/<VERSION>/pat_url + pat_hash
          TMP_YML="$(mktemp)"
          WEBDATA="./webdata.txt"
          > "${TMP_YML}"
          > "${WEBDATA}"

          # Build sorted list of "PLATFORM MODEL_DIR" pairs, then write grouped by platform
          declare -a PLATFORM_MODEL_PAIRS
          for MODEL_DIR in ./dsm/*/; do
            [ -d "${MODEL_DIR}" ] || continue
            MODEL="$(basename "${MODEL_DIR}")"
            PLATFORM="$(lookup_platform "${MODEL}")"
            if [ -z "${PLATFORM}" ]; then
              echo "Warning: no platform for model ${MODEL}, skipping"
              continue
            fi
            PLATFORM_MODEL_PAIRS+=("${PLATFORM} ${MODEL_DIR}")
          done

          CURRENT_PLATFORM=""

          while IFS=' ' read -r PLATFORM MODEL_DIR; do
            MODEL="$(basename "${MODEL_DIR}")"
            declare -A SEEN_URLS
            unset SEEN_URLS; declare -A SEEN_URLS
            ENTRIES=""
            while IFS= read -r VERSION_DIR; do
              [ -d "${VERSION_DIR}" ] || continue
              VERSION="$(basename "${VERSION_DIR}")"
              PAT_URL_FILE="${VERSION_DIR}/pat_url"
              PAT_HASH_FILE="${VERSION_DIR}/pat_hash"
              [ -f "${PAT_URL_FILE}" ] || continue
              [ -f "${PAT_HASH_FILE}" ] || continue
              PAT_URL="$(tr -d '[:space:]' < "${PAT_URL_FILE}")"
              PAT_HASH="$(tr -d '[:space:]' < "${PAT_HASH_FILE}")"
              [ -z "${PAT_URL}" ] && continue
              [ -z "${PAT_HASH}" ] && continue
              if [ -n "${SEEN_URLS[${PAT_URL}]:-}" ]; then
                echo "Skipping duplicate ${MODEL} ${VERSION} (same URL as ${SEEN_URLS[${PAT_URL}]})"
                continue
              fi
              SEEN_URLS["${PAT_URL}"]="${VERSION}"
              PRODUCTVER="${VERSION%%-*}"
              ENTRIES="${ENTRIES}    \"${VERSION}\":\n      url: \"${PAT_URL}\"\n      hash: \"${PAT_HASH}\"\n"
              printf '\n%s %s (%s)\nUrl: %s\nHash: %s\n' \
                "${MODEL}" "${PRODUCTVER}" "${VERSION}" "${PAT_URL}" "${PAT_HASH}" >> "${WEBDATA}"
            done < <(find "${MODEL_DIR}" -mindepth 1 -maxdepth 1 -type d | sort -t- -k4 -Vr)

            [ -z "${ENTRIES}" ] && continue

            if [ "${PLATFORM}" != "${CURRENT_PLATFORM}" ]; then
              printf '%s:\n' "${PLATFORM}" >> "${TMP_YML}"
              CURRENT_PLATFORM="${PLATFORM}"
            fi
            printf '  "%s":\n' "${MODEL}" >> "${TMP_YML}"
            printf '%b' "${ENTRIES}" >> "${TMP_YML}"
          done < <(printf '%s\n' "${PLATFORM_MODEL_PAIRS[@]}" | sort)

          cp -f "${TMP_YML}" ./data.yml
          rm -f "${TMP_YML}"
          echo "Rebuilt data.yml — entries: $(grep -c 'url:' ./data.yml)"
          echo "Rebuilt webdata.txt — entries: $(grep -c '^Hash:' ./webdata.txt)"

      - name: Commit and push
        run: |
          git add ./data.yml ./webdata.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "data: rebuild from dsm/ $(date +%Y-%m-%d\ %H:%M:%S)"
          git push
